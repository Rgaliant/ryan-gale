<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#080c0a"/>
  <text
    x="4"
    y="23"
    font-family="monospace"
    font-size="17"
    font-weight="700"
    fill="#00ff88"
    filter="url(#glow)"
  >&gt;_</text>
